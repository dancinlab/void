<?xml version="1.0" encoding="UTF-8"?>
<!-- need-singularity org avatar · Hexagon + Gravitational Well · monochrome -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="well" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="60%"  stop-color="#000000"/>
      <stop offset="85%"  stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%"   stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <!-- glow around event horizon -->
    <radialGradient id="photon" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="70%"  stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="85%"  stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- Full-canvas body with macOS squircle corners (radius 226/1024 → 113/512).
       macOS Dock does NOT auto-mask app icons, so squircle must be baked into PNG. -->
  <rect x="0" y="0" width="512" height="512" rx="113" ry="113" fill="url(#bg)"/>

  <!-- concentric hexagons (flat-top) warping toward center.
       scale 0.75 → outer vertex 172 px from center (body half-width 206 → 34 px margin inside squircle). -->
  <g transform="translate(256 256)" fill="none" stroke="#f0f0f0" stroke-linejoin="miter">
    <polygon points="184,0 92,159.348 -92,159.348 -184,0 -92,-159.348 92,-159.348"
             stroke-width="3.5" stroke-opacity="1.00"/>
    <polygon points="160,0 80,138.563 -80,138.563 -160,0 -80,-138.563 80,-138.563"
             stroke-width="2.6" stroke-opacity="0.85"/>
    <polygon points="137.6,0 68.8,119.165 -68.8,119.165 -137.6,0 -68.8,-119.165 68.8,-119.165"
             stroke-width="2.2" stroke-opacity="0.76"/>
    <polygon points="116.8,0 58.4,101.151 -58.4,101.151 -116.8,0 -58.4,-101.151 58.4,-101.151"
             stroke-width="1.9" stroke-opacity="0.68"/>
    <polygon points="97.6,0 48.8,84.524 -48.8,84.524 -97.6,0 -48.8,-84.524 48.8,-84.524"
             stroke-width="1.7" stroke-opacity="0.60"/>
    <polygon points="80,0 40,69.283 -40,69.283 -80,0 -40,-69.283 40,-69.283"
             stroke-width="1.5" stroke-opacity="0.52"/>
    <polygon points="64,0 32,55.427 -32,55.427 -64,0 -32,-55.427 32,-55.427"
             stroke-width="1.4" stroke-opacity="0.44"/>
    <polygon points="49.6,0 24.8,42.956 -24.8,42.956 -49.6,0 -24.8,-42.956 24.8,-42.956"
             stroke-width="1.3" stroke-opacity="0.36"/>
    <polygon points="36.8,0 18.4,31.869 -18.4,31.869 -36.8,0 -18.4,-31.869 18.4,-31.869"
             stroke-width="1.2" stroke-opacity="0.28"/>
  </g>

  <!-- 6 radial spokes (subtle) -->
  <g transform="translate(256 256)" stroke="#aaaaaa" stroke-width="1.2" stroke-opacity="0.30" fill="none">
    <line x1="0" y1="0" x2="184" y2="0"/>
    <line x1="0" y1="0" x2="92" y2="159.348"/>
    <line x1="0" y1="0" x2="-92" y2="159.348"/>
    <line x1="0" y1="0" x2="-184" y2="0"/>
    <line x1="0" y1="0" x2="-92" y2="-159.348"/>
    <line x1="0" y1="0" x2="92" y2="-159.348"/>
  </g>

  <!-- photon sphere glow -->
  <circle cx="256" cy="256" r="46" fill="url(#photon)"/>
  <!-- event horizon — solid dark disk -->
  <circle cx="256" cy="256" r="30" fill="url(#well)"/>
  <!-- thin ring at horizon edge -->
  <circle cx="256" cy="256" r="30" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.55"/>
</svg>
